# ============================================================
# Elham Progress — Log Rotation Configuration
# File: logs/logrotate-apache.conf
# Place at: /etc/logrotate.d/apache2
# ============================================================

/var/log/apache2/*.log {
    # Rotate logs daily
    daily

    # Keep 30 days of logs
    rotate 30

    # Don't error if log file is missing
    missingok

    # Don't rotate if log is empty
    notifempty

    # Compress old log files (saves disk space)
    compress

    # Delay compression by 1 cycle (so today's log is kept uncompressed for real-time tailing)
    delaycompress

    # Create new log file after rotation
    create 640 www-data adm

    # Rotate even if file is shared between multiple packages
    sharedscripts

    # Run after rotation to reopen log files
    postrotate
        if invoke-rc.d apache2 status > /dev/null 2>&1; then
            invoke-rc.d apache2 reload > /dev/null 2>&1;
        fi
    endscript
}

# ── SECURITY LOG RETENTION ───────────────────────────────────
# Auth logs — keep 90 days for security investigations
/var/log/auth.log {
    weekly
    rotate 12
    missingok
    notifempty
    compress
    delaycompress
}

/var/log/syslog {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
}
