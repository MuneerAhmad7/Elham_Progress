# ============================================================
# Elham Progress — Logstash Pipeline: Apache Logs
# File: logs/logstash-apache.conf
# Place in: /etc/logstash/conf.d/apache.conf
# ============================================================

input {
  beats {
    port => 5044
    ssl => false  # Set to true and configure certs for production
  }
}

filter {

  # ── Parse Apache Access Logs ──────────────────────────────
  if [log_type] == "apache_access" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} %{USER:ident} %{USER:auth} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{DATA:request_path} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
      tag_on_failure => ["_grokparsefailure_apache"]
    }

    # Parse timestamp
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    # GeoIP lookup for client location
    geoip {
      source => "client_ip"
      target => "geoip"
      add_field => ["[geoip][coordinates]", "%{[geoip][longitude]}"]
      add_field => ["[geoip][coordinates]", "%{[geoip][latitude]}"]
    }
    mutate {
      convert => ["[geoip][coordinates]", "float"]
    }

    # User Agent parsing
    useragent {
      source => "user_agent"
      target => "ua"
    }

    # Classify response codes
    if [response_code] >= 500 {
      mutate { add_tag => ["server_error", "alert_5xx"] }
    } else if [response_code] >= 400 {
      mutate { add_tag => ["client_error"] }
    } else if [response_code] >= 300 {
      mutate { add_tag => ["redirect"] }
    } else if [response_code] >= 200 {
      mutate { add_tag => ["success"] }
    }

    # Flag suspicious patterns
    if [request_path] =~ /(?i)(select|union|insert|drop|delete|update|exec|script|alert|onload|onerror)/ {
      mutate { add_tag => ["suspicious_sql_xss", "security_alert"] }
    }

    if [request_path] =~ /(?i)(\.env|wp-config|\.git|backup|admin|passwd|shadow)/ {
      mutate { add_tag => ["sensitive_path_probe", "security_alert"] }
    }

    if [user_agent] =~ /(?i)(sqlmap|nikto|nmap|masscan|zgrab|dirbuster|gobuster|burp|metasploit)/ {
      mutate { add_tag => ["scanner_detected", "security_alert"] }
    }
  }

  # ── Parse Apache Error Logs ───────────────────────────────
  if [log_type] == "apache_error" {
    grok {
      match => {
        "message" => '\[%{HTTPDERROR_DATE:timestamp}\] \[%{DATA:module}:%{LOGLEVEL:log_level}\] \[pid %{NUMBER:pid}\] %{GREEDYDATA:error_message}'
      }
    }
  }

  # ── Parse Auth Logs ───────────────────────────────────────
  if [log_type] == "system_auth" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} %{DATA:service}: %{DATA:auth_result} password for %{USERNAME:username} from %{IPORHOST:src_ip}",
          "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} %{DATA:service}: %{DATA:auth_result} for %{USERNAME:username} from %{IPORHOST:src_ip}"
        ]
      }
    }

    if "Failed" in [auth_result] {
      mutate { add_tag => ["failed_login", "security_alert"] }
    }
  }

  # ── Remove unnecessary fields ─────────────────────────────
  mutate {
    remove_field => ["host", "agent", "ecs", "input"]
  }
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "elhamco-logs-%{+YYYY.MM.dd}"
    # user => "elastic"
    # password => "YOUR_PASSWORD"
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}
