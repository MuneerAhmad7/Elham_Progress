# ============================================================
# Elham Progress — HTTP Security Headers (Nginx)
# File: security/headers-nginx.conf
# Add inside your server {} block in nginx.conf or site config
# ============================================================

server {
    listen 443 ssl;
    server_name elhamco.com www.elhamco.com;

    # ── SSL Configuration ────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; frame-ancestors 'none';" always;

    # ── Remove Server Info ───────────────────────────────────
    server_tokens off;

    # ── Disable Directory Listing ────────────────────────────
    autoindex off;

    # ── Protect Sensitive Files ──────────────────────────────
    location ~* (\.htaccess|\.env|wp-config\.php|\.git) {
        deny all;
        return 404;
    }

    # ── Block Backup Files ───────────────────────────────────
    location ~* \.(bak|backup|sql|tar\.gz|zip|log|old)$ {
        deny all;
        return 404;
    }

    # ── GZIP Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Browser Caching ──────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Force HTTPS Redirect ─────────────────────────────────────
server {
    listen 80;
    server_name elhamco.com www.elhamco.com;
    return 301 https://$host$request_uri;
}
