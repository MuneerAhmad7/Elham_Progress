<!-- WhatsApp Floating Button with pulse animation -->
<style>
  .wa-float {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    text-decoration: none;
    display: block;
  }

  .wa-float img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .wa-float:hover img {
    transform: scale(1.1);
    box-shadow: 0 6px 28px rgba(37, 211, 102, 0.7);
  }

  /* Pulse ring animation */
  .wa-float::before {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border: 2px solid #25D366;
    border-radius: 50%;
    animation: waPulse 2s infinite;
    opacity: 0;
  }

  @keyframes waPulse {
    0%   { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* Tooltip label */
  .wa-tooltip {
    position: absolute;
    right: 72px;
    top: 50%;
    transform: translateY(-50%);
    background: #25D366;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: sans-serif;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .wa-float:hover .wa-tooltip {
    opacity: 1;
  }
</style>

<a href="https://wa.me/966508989323?text=Hello%2C%20I%20would%20like%20to%20inquire%20about%20your%20construction%20services."
   class="wa-float"
